<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COLMAP SfM Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>COLMAP SfM Viewer</h1>
      <p id="status">読み込み中...</p>
    </header>

    <main class="layout">
      <section class="viewer-panel">
        <div class="viewer-frame" id="viewerFrame">
          <img id="mainImage" alt="Selected view" />
        </div>
        <div class="image-meta" id="imageMeta"></div>
      </section>

      <section class="control-panel">
        <h2>スクロール操作</h2>
        <p>下のパッドを上下/左右にスクロールすると、姿勢に基づいて画像が切り替わります。</p>
        <div class="scroll-pad" id="scrollPad" aria-label="navigation pad">
          <div class="scroll-pad-inner"></div>
        </div>
        <ul>
          <li>上: 現在視点の上方向にあるカメラ位置へ移動</li>
          <li>下: 現在視点の下方向にあるカメラ位置へ移動</li>
          <li>左: 現在視点の左方向にあるカメラ位置へ移動</li>
          <li>右: 現在視点の右方向にあるカメラ位置へ移動</li>
        </ul>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
