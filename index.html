<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>COLMAP Pose Viewer</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <header class="header">
      <h1>COLMAP Pose Viewer</h1>
      <p id="status">Loading...</p>
    </header>

    <main class="layout">
      <section class="viewer-panel">
        <div class="viewer-frame" id="viewerFrame">
          <img id="mainImage" alt="Selected view" />
        </div>
        <div class="image-meta" id="imageMeta"></div>
      </section>
    </main>

    <script src="script.js?v=3" defer></script>
    <script>
      // Prevent iOS Safari page-level gestures (bounce scroll, swipe-back, pinch-zoom)
      document.addEventListener('touchmove', function(e) {
        if (e.target.closest('.viewer-frame')) {
          return; // viewer handles its own touch
        }
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('gesturestart', function(e) {
        if (e.target.closest('.viewer-frame')) return;
        e.preventDefault();
      });
      document.addEventListener('gesturechange', function(e) {
        if (e.target.closest('.viewer-frame')) return;
        e.preventDefault();
      });
      document.addEventListener('gestureend', function(e) {
        if (e.target.closest('.viewer-frame')) return;
        e.preventDefault();
      });
    </script>
  </body>
</html>
